name: ping
# Minimal diagnostic: no external actions (no checkout/setup-*), one echo step.
# If this gets a runner and succeeds, runners work and the issue is in ci.yml.
# If this also fails at startup with no runner, the block is account/repo-side.
on: [push, workflow_dispatch]

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - run: echo "runner ok on $(uname -a)"
