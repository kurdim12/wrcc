name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
  workflow_dispatch:

jobs:
  # Full suite (29 tests): 19 dose-safety (device FSM gauntlet + server doseEngine
  # caps) + 10 expert/fusion unit tests.
  safety-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22          # built-in node:sqlite, no native build
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        run: npm install --no-audit --no-fund
        working-directory: backend
      - name: Device-side dose FSM failsafes
        run: python3 tests/test_device_fsm.py
      - name: Server-side dose caps (spawns a fresh backend)
        run: python3 tests/test_server_caps.py
      - name: Intelligence layer — expert/fusion unit tests
        run: node --test tests/test_intelligence.mjs

  # Dashboard must build (catches import/JSX regressions before the demo).
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install + build
        run: npm install --no-audit --no-fund && npm run build
        working-directory: frontend

  # ML pipeline smoke on TOY data: prepare -> train -> export -> serve loads it.
  # (TOY DATA — not real metrics; this only proves the pipeline runs.)
  ml-toy-smoke:
    runs-on: ubuntu-latest
    env:
      TF_CPP_MIN_LOG_LEVEL: "3"
      TF_ENABLE_ONEDNN_OPTS: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ML deps (serve + train)
        run: pip install tensorflow-cpu librosa soundfile scikit-learn pandas numpy fastapi "uvicorn[standard]" pydantic
      - name: Generate toy corpus + standardize
        working-directory: ml
        run: |
          python -m prepare.make_toy_corpus
          python -m prepare.standardize --in data/raw/toy/activity --label activity --source toy
          python -m prepare.standardize --in data/raw/toy/clean    --label clean    --source toy
      - name: Train (TOY) + export int8 tflite
        working-directory: ml
        run: |
          python -m train.train --manifest data/manifest.csv --epochs 2 --version TOY-DATA-not-real-v0
          python -m export.export_tflite --saved export/saved_model --manifest data/manifest.csv
          test -f export/model_int8.tflite
      - name: serve auto-loads the trained toy model + honesty schema present
        working-directory: ml
        run: |
          python -c "import serve.app as a; assert a._model_loaded, 'toy model failed to load'; assert 'toy' in a._model_version.lower(); h=a.health(); assert h['model_family']=='acoustic_activity_proxy' and h['validation_status']=='proxy_validated_not_field_validated' and h['claim_guardrail']=='risk_indicator_not_confirmed_rpw_detection' and h['feature_version'], 'honesty/schema fields missing'; print('serve loaded:', a._model_version, '| honesty OK')"
