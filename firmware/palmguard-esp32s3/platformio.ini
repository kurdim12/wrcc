; Palm Guard - ESP32-S3 sensor node + pin auto-detector
;
; Environments:
;   palmguard       -> serial-mode sensor firmware (default; pairs with serial_bridge.py)
;   palmguard_wifi  -> HTTP-mode firmware; receives the dose downlink command
;   detect          -> one-shot pin scanner that finds I2C + 1-Wire wiring
;
; Serial output goes to UART0 (the USB-UART bridge on the DevKitC-1, which
; auto-detects as COMx). We deliberately do NOT use the native USB CDC mode
; because flashing + monitoring are simpler with a single COM port.

[platformio]
default_envs = palmguard

[common]
platform = espressif32@^6.7
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600
; Shared libs. Adafruit NeoPixel drives the status LED (few LEDs, low bright).
lib_deps_common =
  bblanchon/ArduinoJson@^7.0
  paulstoffregen/OneWire@^2.3
  adafruit/Adafruit NeoPixel@^1.12
  adafruit/Adafruit BME680 Library@^2.0
  adafruit/Adafruit Unified Sensor@^1.1

# ─── Normal Palm Guard firmware (serial bridge) ────────────────────────
# NOTE (Appendix C item 5): we deliberately do NOT pass -DPG_FFT_N here.
# config.h fixes the FFT length at 1024 — it is the single source of truth.
[env:palmguard]
platform        = ${common.platform}
board           = ${common.board}
framework       = ${common.framework}
monitor_speed   = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}
upload_speed    = ${common.upload_speed}

build_src_filter =
  +<*>
  -<detect.cpp>
  -<net/>

build_flags =
  -DCORE_DEBUG_LEVEL=3

lib_deps = ${common.lib_deps_common}

# ─── HTTP firmware (WiFi uplink + dose downlink) ───────────────────────
# Builds the net/ layer and flips transport to HTTP so poster_send() can
# receive the {dose,pump_ms,nonce} command in the backend's POST response.
[env:palmguard_wifi]
platform        = ${common.platform}
board           = ${common.board}
framework       = ${common.framework}
monitor_speed   = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}
upload_speed    = ${common.upload_speed}

build_src_filter =
  +<*>
  -<detect.cpp>

build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DPG_EMIT_HTTP=1
  -DPG_EMIT_SERIAL=0

lib_deps = ${common.lib_deps_common}

# ─── Auto-detect-only firmware ─────────────────────────────────────────
[env:detect]
platform        = ${common.platform}
board           = ${common.board}
framework       = ${common.framework}
monitor_speed   = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}
upload_speed    = ${common.upload_speed}

build_src_filter =
  -<*>
  +<detect.cpp>

build_flags =
  -DCORE_DEBUG_LEVEL=2

lib_deps =
  paulstoffregen/OneWire@^2.3
